# Cell A on Colab T4 — pure Mamba2 SSM floor with AMP
cell: A
d_model: 384
n_layers: 14
expand: 4
d_state: 64
n_heads: 4
use_attention: false
use_workspace: false
recurrent_core: false

# Training
lr: 6.0e-4
max_steps: 10000
tokens_per_batch: 250000
seq_len: 128
warmup_steps: 1500
weight_decay: 0.1
grad_clip: 1.0
z_loss_coef: 1.0e-4
depth_range: [2, 8]
eval_interval: 500
log_interval: 50
checkpoint_interval: 900
seed: 42

# AMP — T4 has no bf16, use fp16
use_amp: true

# Gradient accumulation — Colab T4 has 15GB VRAM
# Micro-batch of 256 with 7 accumulation steps = 1792 effective batch
# (gradient checkpointing frees ~12GB, allowing larger micro-batch)
micro_batch_size: 256

# Wandb
wandb: false
wandb_project: mamba-workspace-poc
run_name: cellA-colab-seed1

# Checkpointing
ckpt_dir: checkpoints
resume: true
gdrive_ckpt_dir: /content/drive/MyDrive/jasper-checkpoints
