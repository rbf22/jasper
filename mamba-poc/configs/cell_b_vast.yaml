# Cell B — hybrid baseline, optimized for Vast.ai RTX 3090 (24GB VRAM)
cell: B
d_model: 384
n_layers: 14
expand: 4
d_state: 64
n_heads: 4
use_attention: true
attention_positions: [5, 10]
use_workspace: false
recurrent_core: false

# Training
lr: 6.0e-4
max_steps: 10000
tokens_per_batch: 250000
seq_len: 128
warmup_steps: 500
weight_decay: 0.1
grad_clip: 1.0
depth_range: [2, 8]
eval_interval: 500
log_interval: 50
checkpoint_interval: 900
seed: 42

# AMP — fp16 for speed
use_amp: true

# RTX 3090 has 24GB — can fit larger micro-batches
# Micro-batch 256 with 8 accumulation steps = 2048 effective batch
micro_batch_size: 256

# Wandb
wandb: false
wandb_project: mamba-workspace-poc
run_name: cellB-vast-seed1

# Checkpointing
ckpt_dir: checkpoints
resume: true
