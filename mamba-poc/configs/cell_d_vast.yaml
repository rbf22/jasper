# Cell D — full architecture, optimized for Vast.ai RTX 3090 (24GB VRAM)
cell: D
d_model: 384
n_layers: 13
expand: 4
d_state: 64
n_heads: 4
use_attention: true
attention_positions: [5, 10]
use_workspace: true
n_workspace_slots: 16
recurrent_core: true
core_start: 6
core_end: 10
k_train_max: 6
k_inference: 6

# Training
lr: 6.0e-4
max_steps: 10000
tokens_per_batch: 250000
seq_len: 128
warmup_steps: 500
weight_decay: 0.1
grad_clip: 1.0
depth_range: [2, 8]
eval_interval: 500
log_interval: 50
checkpoint_interval: 900
seed: 42

# AMP — fp16 for speed
use_amp: true

# RTX 3090 has 24GB — Cell D uses more memory (workspace + recurrent core)
# Micro-batch 128 with 16 accumulation steps = 2048 effective batch
micro_batch_size: 128

# Wandb
wandb: false
wandb_project: mamba-workspace-poc
run_name: cellD-vast-seed1

# Checkpointing
ckpt_dir: checkpoints
resume: true
