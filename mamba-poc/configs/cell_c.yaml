# Cell C: Hybrid + workspace (11 Mamba2 + 2 attention + perceiver workspace)
cell: C
d_model: 384
n_layers: 13
expand: 4
d_state: 64
n_heads: 4
use_attention: true
attention_positions: [5, 10]
use_workspace: true
n_workspace_slots: 16
recurrent_core: false

# Training
lr: 6.0e-4
max_steps: 10000
tokens_per_batch: 250000
seq_len: 128
warmup_steps: 200
weight_decay: 0.1
grad_clip: 1.0
depth_range: [2, 8]
eval_interval: 500
log_interval: 50
checkpoint_interval: 900
seed: 42

# Wandb
wandb: false
wandb_project: mamba-workspace-poc
run_name: cellC-seed1

# Checkpointing
ckpt_dir: checkpoints
resume: true
