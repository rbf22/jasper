# Cell A: Pure Mamba2 (14 layers) — SSM floor
cell: A
d_model: 384
n_layers: 14
expand: 4
d_state: 64
n_heads: 4
use_attention: false
use_workspace: false
recurrent_core: false

# Training
lr: 6.0e-4
max_steps: 10000
tokens_per_batch: 250000
seq_len: 128
warmup_steps: 200
weight_decay: 0.1
grad_clip: 1.0
depth_range: [2, 8]
eval_interval: 500
log_interval: 50
checkpoint_interval: 900
seed: 42

# Wandb
wandb: false
wandb_project: mamba-workspace-poc
run_name: cellA-seed1

# Checkpointing
ckpt_dir: checkpoints
resume: true
